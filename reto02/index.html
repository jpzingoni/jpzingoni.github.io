<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">

    <title>Google</title>
    
    <!-- Se agrega un icono a la pestaña del navegador -->

    <link rel="shortcut icon" href="/reto02/images/googleIconHead.png" sizes="32x32">

    <!-- metatags con información personal -->
    
    <meta name="description" content="Mi primer master class"></meta>
    <meta name="keywords" content="html, css, portfolio, link tree">
    <meta name="author" content="Juan Pedro Zingoni alumno Summerhack 2023. juanzingoni@gmail.com">
    <meta name="copyright" content="Página de contacto versión link tree para movil 2023">
</head>
<body>
    <main class="conteiner" id="conteiner-total">
        <header>
            <div id="textoHeader">
            <a href="https://www.google.com/intl/es-419/gmail/about/">Gmail</a>
            <a href="https://www.google.com.ar/imghp?hl=es-419&authuser=0&ogbl">Imágenes</a>
            </div>
            <div id="imagenesHeader">
            <img id="showAppButton" src="/reto02/images/showApp.png" alt="Show button apps">
            <img id="profilePhoto" src="/reto02/images/profilepic.png" alt="Profile photo">
            </div>
        </header>
        <div id="chocolate-menu">
            <div>
                <img src="/reto02/images/profilepic.png" alt="Profile photo">
                <p>Cuenta</p>
            </div>
            <div>
                <img src="/reto02/images/googleIconHead.png" alt="Google search">
                <p>Búsqueda</p>
            </div>
            <div>
                <img src="/reto02/images/google-maps.png" alt="Google Maps Icon">
                <p>Maps</p>
            </div>
            <div>
                <img src="/reto02/images/youtube.png" alt="Youtube icon">
                <p>Youtube</p>
            </div>
            <div>
                <img src="/reto02/images/google-play.png" alt="Play store icon">
                <p>Play Store</p>
            </div>
            <div>
                <img src="/reto02/images/meet.png" alt="Googel meet icon">
                <p>Meet</p>
            </div>
        </div>
        <div id="logo">
            <img id="logo" src="/reto02/images/googlelogo_light_color_272x92dp.png" alt="Logo Google">
        </div>
        <div id="form">
            <div id="conteiner-buscador">
                <div id="buscador">
                    <div id="imagen-lupa">
                        <img src="/reto02/images/lupa.png" alt="magnifying glass icon">
                    </div>
                    <input id="barra-busqueda" type="text" maxlength="800">
                    <div id="imagenes-mic-cam">
                        <img src="/reto02/images/google-voice.png" alt="Microphone icon">
                        <img src="/reto02/images/google-camera.svg" alt="Camera icon">
                    </div>
                </div>
                <div id="busquedas">
                    <p><img src="/reto02/images/lupa.png" alt="magnifying glass icon">Busqueda 1</p>
                    <p><img src="/reto02/images/lupa.png" alt="magnifying glass icon">Busqueda 2</p>
                    <p><img src="/reto02/images/lupa.png" alt="magnifying glass icon">Busqueda 3</p>
                    <div id="botones-buscador-1">
                        <button class="boton">Buscar con Google</button>
                        <button class="boton">Voy a tener suerte</button>
                    </div>
                </div>
            </div>
            <div id="botones-buscador-2">
                <button class="boton">Buscar con Google</button>
                <button class="boton">Voy a tener suerte</button>
            </div>
            <!-- <div id="texto-copyright">
                <p>Ofrecido por Google en : <a href="">Español (Latinoamérica)</a></p>
            </div> -->
        </div>
        <footer>
            <div id="pais">
                <p>Argentina</p>
            </div>
            <div id="links-footer">
                <div id="links-footer-1">
                    <a href="https://about.google/?utm_source=google-AR&utm_medium=referral&utm_campaign=hp-footer&fg=1" target="_blank">Sobre Google</a>
                    <a href="https://ads.google.com/intl/es-419_ar/home/?subid=ww-ww-et-g-awa-a-g_hpafoot1_1!o2&utm_source=google.com&utm_medium=referral&utm_campaign=google_hpafooter&fg=1" target="_blank">Publicidad</a>
                    <a href="https://smallbusiness.withgoogle.com/intl/es-419_ar/?subid=ww-ww-et-g-awa-a-g_hpbfoot1_1!o2&utm_source=google&utm_medium=ep&utm_campaign=google_hpbfooter&utm_content=google_hpbfooter&gmbsrc=ww-ww-et-gs-z-gmb-s-z-u~sb-g4sb_srvcs-u&c=AR#!/" target="_blank">Negocios</a>
                    <a href="https://www.google.com/search/howsearchworks/?fg=1" target="_blank">Cómo funciona la Búsqueda</a>
                </div>
                <div id="links-footer-2">
                    <a href="https://policies.google.com/privacy?hl=es-419&fg=1" target="_blank">Privacidad</a>
                    <a href="https://policies.google.com/terms?hl=es-419&fg=1" target="_blank">Condiciones</a>
                    <a href="" target="_blank">Preferencias</a>
                </div>
            </div>  
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
