<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="shortcut icon" href="/reto02/images/googleIconHead.png" sizes="32x32">
    <title>Google</title>
</head>
<body>
    <main class="conteiner" id="conteiner-total">
        <header>
            <div id="textoHeader">
            <a href="">Gmail</a>
            <a href="">Imágenes</a>
            </div>
            <div id="imagenesHeader">
            <img id="showAppButton" src="/reto02/images/appbuttons.png" alt="Show button apps">
            <img id="profilePhoto" src="/reto02/images/profilepic.png" alt="Profile photo">
            </div>
        </header>
        <div id="logo">
            <img id="logo" src="/reto02/images/googleLogo.png" alt="Logo Google">
        </div>
        <div id="form">
            <div id="conteiner-buscador">
                <div id="buscador">
                    <div id="imagen-lupa">
                        <img src="/reto02/images/lupa.png" alt="">
                    </div>
                    <input id="barra-busqueda" type="text" maxlength="800">
                    <div id="imagenes-mic-cam">
                        <img src="/reto02/images/googlevoice.png" alt="">
                        <img src="/reto02/images/google-cam.svg" alt="">
                    </div>
                </div>
                <div id="busquedas">
                    <p><img src="images/lupa.png" alt="">Busqueda 1</p>
                    <p><img src="images/lupa.png" alt="">Busqueda 2</p>
                    <p><img src="images/lupa.png" alt="">Busqueda 3</p>
                </div>
            </div>
            <div id="botones-buscador">
                <button class="boton">Buscar con Google</button>
                <button class="boton">Voy a tener suerte</button>
            </div>
            <!-- <div id="texto-copyright">
                <p>Ofrecido por Google en : <a href="">Español (Latinoamérica)</a></p>
            </div> -->
        </div>
        <footer>
            <div id="pais">
                <p>Argentina</p>
            </div>
            <div id="links-footer">
                <div id="links-footer-1">
                    <a href="">Sobre Google</a>
                    <a href="">Publicidad</a>
                    <a href="">Negocios</a>
                    <a href="">Cómo funciona la busqueda</a>
                </div>
                <div id="links-footer-2">
                    <a href="">Privacidad</a>
                    <a href="">Condiciones</a>
                    <a href="">Preferencias</a>
                </div>
            </div>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
