<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <title>To do list</title>
    <!-- Se agrega un icono a la pestaña del navegador -->
    <link rel="shortcut icon" href="/images/book.png" sizes="32x32">
    
    <!-- metatags con información personal -->
    
    <meta name="description" content="To do app relizada para el sumeerhack 2023"></meta>
    <meta name="keywords" content="html, css, portfolio, link tree, todo app">
    <meta name="author" content="Juan Pedro Zingoni alumno Summerhack 2023. juanzingoni@gmail.com">
    <meta name="copyright" content="Todo app versión movil">
</head>
<body>
    <div class="container">
        <header>
            <div id="nav-bar">
                <img src="/images/bar-lines.png" alt="line bar" id="bar-lines">
                <p>TO DO LIST</p>
                <img id="profile-pic" src="/images/profilepic.png" alt="profile pic">
            </div>
        </header>
        <section id="main-section">
            <div id="main-id">
                <img id="main-image" src="/images/party-face.png" alt="party-face">
                <div>
                    <h1>No hay tareas pendientes</h1>
                </div>
            </div>
            <div id="tareas-agregadas">
                <ul id="lista-de-tareas">
                </ul>
            </div>
        </section>
        <div class="pop-up" id="pop-up">
            <div id="pop-up-nav">
                <p>Ingresa una tarea</p>
                <img src="/images/close-pop-up.png" alt="" id="close-pop-up">
            </div>
            <div id="form">
                <label for="task-name">Nombre de la tarea:</label>
                <textarea name="task-name" id="task-name" cols="30" rows="3"></textarea>
                <label for="task-type">Tipo de tarea</label>
                <select name="task-type" id="task-type">
                    <option value="work" class="task-type-eleccion">Trabajo</option>
                    <option value="personal" class="task-type-eleccion">Personal</option>
                    <option value="domestic" class="task-type-eleccion">Doméstica</option>
                    <option value="fun" class="task-type-eleccion">Entretenimiento</option>
                </select>
                <label for="description">Descripción:</label>
                <textarea name="description" id="description" cols="30" rows="3"></textarea>
                    <div id="prioridades">
                        <p>Prioridad</p>
                        <fieldset>
                            <div>
                                <input type="radio" name="priority" value="priority-1" id="priority-1" checked>
                                <label for="priority-1">Muy importante</label>
                            </div>
                            <div> 
                                <input type="radio" name="priority" value="priority-2" id="priority-2">
                                <label for="priority-2">Es importante</label>
                            </div>
                            <div>
                                <input type="radio" name="priority" value="priority-3" id="priority-3">
                                <label for="priority-3">Puede esperar</label>
                            </div>
                        </fieldset>
                    </div>
                    <div id ="botones-form">
                        <button id="cancelar">Cancelar</button>
                        <button id="agregar">Agregar</button>
                    </div>
            </div>
        </div>
        <footer>
            <img id="add-button" src="/images/add-task.png" alt="">
        </footer>
    </div>
</body>

<script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
<script src="script.js"></script>
</html>
