<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>To do list</title>
</head>
<body>
    <div class="container">
        <header>
            <div id="nav-bar">
                <img src="/reto03/images/bar-lines.png" alt="line bar">
                <p>TO DO LIST</p>
                <img id="profile-pic" src="/reto03/images/profilepic.png" alt="profile pic">
            </div>
        </header>
        <section>
            <img id="main-image" src="/reto03/images/party-face.png" alt="party-face">
            <div>
            <h1>Felicidades. No tienes tareas pendientes</h1>
            <ul>
                <li>Primer item 1</li>
            </ul>
            </div>
        </section>
        <div class="pop-up" id="pop-up">
            <div id="pop-up-nav">
                <p>Ingresa una tarea</p>
                <img src="/reto03images/bar-lines.png" alt="" id="close-pop-up">
            </div>/
            <div id="form">
                <label for="task-name">Nombre de la tarea:</label>
                <textarea name="task-name" id="task-name" cols="30" rows="3"></textarea>
                <label for="task-type">Tipo de tarea</label>
                <select name="task-type" id="task-type">
                    <option value="work">Trabajo</option>
                    <option value="personal">Personal</option>
                    <option value="domestic">Doméstica</option>
                    <option value="fun">Entretenimiento</option>
                    <option value="labor">Laborales</option>
                </select>
                <label for="description">Descripción:</label>
                <textarea name="description" id="description" cols="30" rows="3"></textarea>
                    <div>
                        <p>Prioridad</p>
                        <fieldset>
                            <input type="radio" name="priority" id="priority-1" checked>
                            <label for="priority-1">Muy importante</label>
                            <input type="radio" name="priority" id="priority-2">
                            <label for="priority-2">Es importante</label>
                            <input type="radio" name="priority" id="priority-3">
                            <label for="priority-3">Puede esperar</label>
                        </fieldset>
                    </div>
                    <div>
                        <button>Cancelar</button>
                        <button>Agregar</button>
                    </div>
            </div>
        </div>
        <footer>
            <img id="add-button" src="/reto03/images/bar-lines.png" alt="">
        </footer>
    </div>
</body>

<script src="script.js"></script>
</html>
